<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>読書空間</title>
  <meta name="description" content="読書記録・本棚管理・積読管理を行うiOSアプリ「読書空間」の紹介ページです。">
  <style>
    :root {
      --bg: #070A0F;
      --bg-soft: #0D1118;
      --card: #141A23;
      --card-strong: #1A2230;
      --border: #263142;
      --text: #F5F7FA;
      --muted: #AAB2C0;
      --subtle: #6F7887;
      --accent: #F2C94C;
      --accent-soft: rgba(242, 201, 76, 0.14);
      --shadow: rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    html {
      background: var(--bg);
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 18% 10%, rgba(242, 201, 76, 0.10), transparent 28%),
        radial-gradient(circle at 82% 0%, rgba(115, 137, 174, 0.14), transparent 30%),
        linear-gradient(180deg, #0A0F17 0%, var(--bg) 48%, #05070B 100%);
      line-height: 1.75;
      letter-spacing: 0.02em;
    }

    main {
      width: min(960px, calc(100% - 40px));
      margin: 0 auto;
      padding: 72px 0 56px;
    }

    .hero {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 32px;
      align-items: center;
      margin-bottom: 32px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border: 1px solid rgba(242, 201, 76, 0.32);
      border-radius: 999px;
      color: var(--accent);
      background: var(--accent-soft);
      font-size: 13px;
      font-weight: 650;
    }

    h1 {
      margin: 18px 0 12px;
      font-size: clamp(42px, 7vw, 72px);
      line-height: 1.05;
      letter-spacing: -0.06em;
    }

    .lead {
      margin: 0;
      max-width: 620px;
      color: var(--muted);
      font-size: clamp(16px, 2vw, 19px);
    }

    .status {
      display: inline-flex;
      margin-top: 24px;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 14px;
      color: var(--muted);
      background: rgba(20, 26, 35, 0.78);
      font-size: 14px;
    }

    .cover-stack {
      position: relative;
      min-height: 320px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 32px;
      background: linear-gradient(145deg, rgba(26, 34, 48, 0.92), rgba(13, 17, 24, 0.94));
      box-shadow: 0 24px 80px var(--shadow);
      overflow: hidden;
    }

    .cover-stack::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(255,255,255,0.05), transparent 34%),
        radial-gradient(circle at 70% 20%, rgba(242,201,76,0.22), transparent 24%);
    }

    .book {
      position: absolute;
      width: 118px;
      height: 176px;
      border-radius: 12px 16px 16px 12px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: linear-gradient(160deg, #273247, #111823);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.36);
    }

    .book::after {
      content: "";
      position: absolute;
      left: 16px;
      top: 18px;
      bottom: 18px;
      width: 1px;
      background: rgba(255, 255, 255, 0.16);
    }

    .book:nth-child(1) {
      left: 72px;
      top: 76px;
      transform: rotate(-8deg);
      background: linear-gradient(160deg, #39445C, #151B26);
    }

    .book:nth-child(2) {
      left: 166px;
      top: 56px;
      transform: rotate(5deg);
      background: linear-gradient(160deg, #6A5527, #171B22);
    }

    .book:nth-child(3) {
      left: 252px;
      top: 92px;
      transform: rotate(11deg);
      background: linear-gradient(160deg, #26384B, #121820);
    }

    section {
      margin-top: 24px;
      padding: 28px;
      border: 1px solid var(--border);
      border-radius: 28px;
      background: rgba(20, 26, 35, 0.82);
      box-shadow: 0 18px 64px rgba(0, 0, 0, 0.20);
    }

    h2 {
      margin: 0 0 18px;
      font-size: 22px;
      letter-spacing: -0.03em;
    }

    .features {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .features li {
      min-height: 96px;
      padding: 16px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 18px;
      color: var(--text);
      background: linear-gradient(180deg, var(--card-strong), var(--card));
      font-size: 14px;
      font-weight: 650;
    }

    .features li span {
      display: block;
      width: 28px;
      height: 3px;
      margin-bottom: 14px;
      border-radius: 999px;
      background: var(--accent);
    }

    .note {
      margin: 0;
      color: var(--muted);
    }

    .footer {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--subtle);
      font-size: 13px;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    @media (max-width: 820px) {
      main {
        width: min(100% - 28px, 640px);
        padding-top: 48px;
      }

      .hero {
        grid-template-columns: 1fr;
      }

      .cover-stack {
        min-height: 240px;
      }

      .book:nth-child(1) { left: 52px; top: 52px; }
      .book:nth-child(2) { left: 142px; top: 34px; }
      .book:nth-child(3) { left: 228px; top: 66px; }

      .features {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 520px) {
      .features {
        grid-template-columns: 1fr;
      }

      section {
        padding: 22px;
        border-radius: 22px;
      }

      .cover-stack {
        display: none;
      }

      .footer {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="hero">
      <div>
        <div class="badge">iOS App / 開発中</div>
        <h1>読書空間</h1>
        <p class="lead">読書記録・本棚管理・積読管理を行う、静かで上質な読書管理アプリです。</p>
        <div class="status">現在開発中です。App Store公開後に情報を更新します。</div>
      </div>

      <div class="cover-stack" aria-hidden="true">
        <div class="book"></div>
        <div class="book"></div>
        <div class="book"></div>
      </div>
    </div>

    <section>
      <h2>主な機能</h2>
      <ul class="features">
        <li><span></span>読んだ本の記録</li>
        <li><span></span>本棚管理</li>
        <li><span></span>積読管理</li>
        <li><span></span>書籍検索</li>
        <li><span></span>表紙画像の表示</li>
      </ul>
    </section>

    <section>
      <h2>外部サービスの利用</h2>
      <p class="note">本アプリでは、書籍検索および表紙画像取得のために楽天ブックス書籍検索APIを利用します。</p>
    </section>

    <div class="footer">
      <span>開発元：fun-products</span>
      <span>© 2026 Reading Space</span>
    </div>
  </main>
</body>
</html>
